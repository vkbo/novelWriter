errorText = "red"

[Syntax]
background     = "base"
text           = "default"
line           = "default:32"
link           = "blue"
headerText     = "green"
headerTag      = "green:L135"
emphasis       = "orange"
whitespace     = "orange:64"
dialog         = "blue"
altDialog      = "red"
note           = "yellow:D125"
hidden         = "faded"
