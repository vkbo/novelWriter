[Main]
name   = "Blue Streak Dark"
mode   = "dark"
author = "Veronica Berglyd Olsen"
credit = "Veronica Berglyd Olsen"
url    = "https://github.com/vkbo/novelWriter"

[Base]
base    = "#2d2d2d"
default = "#cccccc"
faded   = "#999999"
red     = "#ff6666"
orange  = "#ff9966"
yellow  = "#ffcc66"
green   = "#99cc99"
cyan    = "#66cccc"
blue    = "#6699cc"
purple  = "#cc99cc"

[Project]
root     = "blue"
folder   = "default"
file     = "default"
title    = "blue:D150"
chapter  = "blue"
scene    = "blue:L150"
note     = "yellow"
active   = "blue:L150"
inactive = "blue:D150"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "default"
markdown  = "orange"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "base:L125"
windowText      = "default"
base            = "base"
alternateBase   = "base:L150"
text            = "default"
tooltipBase     = "yellow:L140"
tooltipText     = "base:D150"
button          = "base"
buttonText      = "default"
brightText      = "base"
highlight       = "blue"
highlightedText = "default:L120"
link            = "blue"
linkVisited     = "blue"
accent          = "blue"

[GUI]
helpText    = "blue:L125"
fadedText   = "faded"
errorText   = "red"
toggle      = "blue:128"
searchMatch = "orange:96"

[Syntax]
background     = "base"
text           = "default"
line           = "blue:48"
link           = "blue"
headerText     = "blue"
headerTag      = "blue:D150"
emphasis       = "blue:L150"
whitespace     = "blue:64"
dialog         = "blue"
altDialog      = "blue:L150"
note           = "blue:L150"
hidden         = "faded"
shortcode      = "blue:D125"
keyword        = "blue:D125"
tag            = "blue"
value          = "blue"
optional       = "blue"
spellCheckLine = "red"
errorLine      = "green"
replaceTag     = "blue:L150"
modifier       = "blue:D125"
textHighlight  = "blue:96"
