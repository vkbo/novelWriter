[Main]
name   = "Primer Night"
mode   = "dark"
author = "Myian"
credit = "GitHub, Inc."
url    = "https://github.com/primer"

[Base]
base    = "#0d1117"
default = "#f0f6fc"
faded   = "#6e7681"
red     = "#ff7b72"
orange  = "#ffa657"
yellow  = "#f8e3a1"
green   = "#56d364"
cyan    = "#57CCC5"
blue    = "#79c0ff"
purple  = "#c398ff"

[Project]
root     = "default"
folder   = "orange"
file     = "#8adfd7"
title    = "#238636"
chapter  = "#56d364"
scene    = "#aff5b4"
note     = "yellow"
active   = "default"
inactive = "faded"
disabled = "#484f58"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "#ff9bce"
markdown  = "default"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "#161b22"
windowText      = "default"
base            = "base"
