emphasis       = "#7ee787"
whitespace     = "#7ee78764"
dialog         = "#ffffff"
altDialog      = "#57ccc5"
note           = "#f8e3a1"
hidden         = "faded"
shortcode      = "#ff9bce"
keyword        = "#4493f8"
