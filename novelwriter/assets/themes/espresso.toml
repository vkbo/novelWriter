emphasis       = "orange"
whitespace     = "orange:64"
dialog         = "yellow"
altDialog      = "orange"
note           = "yellow:L125"
hidden         = "faded"
shortcode      = "green"
keyword        = "red"
tag            = "green"
value          = "orange"
optional       = "yellow"
spellCheckLine = "red"
errorLine      = "green"
replaceTag     = "cyan"
modifier       = "blue"
textHighlight  = "yellow:108"
