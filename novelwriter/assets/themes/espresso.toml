[Main]
name   = "Espresso"
mode   = "dark"
author = "Veronica Berglyd Olsen"
credit = "Sainnhe Park and Antoine Cotten"
url    = "https://github.com/sainnhe/sonokai"

[Base]
base    = "#2f2726"
default = "#e5e4e2"
faded   = "#96817b"
red     = "#f86882"
orange  = "#f08d71"
yellow  = "#f0c66f"
green   = "#a6cd77"
cyan    = "#81d0c9"
blue    = "#89a8e0"
purple  = "#9fa0e1"

[Project]
root     = "blue"
folder   = "yellow"
file     = "default"
title    = "green"
chapter  = "red"
scene    = "blue"
note     = "yellow"
active   = "green"
inactive = "red"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "default"
markdown  = "orange"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "base:L125"
windowText      = "default"
base            = "base"
alternateBase   = "#51403c"
text            = "default"
tooltipBase     = "yellow:L125"
tooltipText     = "base"
button          = "base"
buttonText      = "default"
brightText      = "base"
highlight       = "#4e5f80"
highlightedText = "default"
link            = "blue"
