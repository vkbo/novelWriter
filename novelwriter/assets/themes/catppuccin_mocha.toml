red     = "#f38ba8"
orange  = "#fab387"
yellow  = "#f9e2af"
green   = "#a6e3a1"
cyan    = "#89dceb"
blue    = "#89b4fa"
purple  = "#cba6f7"

[Project]
root     = "default"
folder   = "#eba0ac"
file     = "default"
title    = "purple"
chapter  = "blue"
scene    = "cyan"
note     = "yellow"
active   = "green"
inactive = "red"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
