emphasis       = "blue"
whitespace     = "blue:64"
dialog         = "green"
altDialog      = "cyan"
note           = "purple"
hidden         = "faded"
shortcode      = "orange"
keyword        = "orange"
tag            = "purple"
value          = "faded"
optional       = "faded"
spellCheckLine = "red"
errorLine      = "cyan"
replaceTag     = "purple"
modifier       = "red"
textHighlight  = "cyan:64"
