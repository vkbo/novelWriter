[Main]
name   = "Everforest Light"
mode   = "light"
author = "Myian"
credit = "Sainnhe Park"
url    = "https://github.com/sainnhe/everforest"

[Base]
base    = "#fffbef"
default = "#5c6a72"
faded   = "#939f91"
red     = "#f85552"
orange  = "#f57d26"
yellow  = "#dfa000"
green   = "#8da101"
cyan    = "#35a77c"
blue    = "#3a94c5"
purple  = "#df69ba"

[Project]
root     = "default"
folder   = "orange"
file     = "red"
title    = "green"
chapter  = "blue"
scene    = "purple"
note     = "faded"
active   = "cyan"
inactive = "orange"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "default"
markdown  = "orange"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "#f2efdf"
windowText      = "default"
base            = "base"
alternateBase   = "#e8e5d5"
text            = "default"
tooltipBase     = "#fef2d5"
tooltipText     = "default"
button          = "#f8f5e4"
buttonText      = "default"
brightText      = "base"
highlight       = "#93b259"
highlightedText = "base"
link            = "blue"
linkVisited     = "blue"
accent          = "#93b259"
toggle          = "#93b2597f"
searchMatch     = "orange:72"

[GUI]
helpText  = "#829181"
fadedText = "faded"
errorText = "red"

[Syntax]
background     = "base"
text           = "default"
line           = "#edeada"
link           = "blue"
headerText     = "cyan"
