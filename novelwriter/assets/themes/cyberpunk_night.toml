[Main]
name   = "Cyberpunk Night"
mode   = "dark"
author = "Anders Lemvigh"
url    = "https://github.com/alemvigh"

[Base]
base    = "#000000"
default = "#888888"
faded   = "#616161"
red     = "#f24817"
orange  = "#ff960a"
yellow  = "#ffff00"
green   = "#00ff00"
cyan    = "#00ffff"
blue    = "#4d4dff"
purple  = "#320064"

[Project]
root     = "blue"
folder   = "yellow"
file     = "default"
title    = "green"
chapter  = "red"
scene    = "blue"
note     = "yellow"
active   = "green"
inactive = "red"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "default"
markdown  = "orange"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "base"
windowText      = "#969696"
base            = "base"
alternateBase   = "#282828"
text            = "#969696"
tooltipBase     = "#281446"
tooltipText     = "#ffffff"
button          = "#05000a"
buttonText      = "#969696"
brightText      = "#ffffff"
highlight       = "#321e50"
highlightedText = "#ffffff"
link            = "blue"
linkVisited     = "#320050"
accent          = "#321e50"

[GUI]
helpText    = "faded"
fadedText   = "faded"
errorText   = "red"
toggle      = "#321e50"
searchMatch = "orange:96"

[Syntax]
background     = "base"
text           = "#969696"
line           = "#282828"
link           = "blue"
headerText     = "#ffffff"
headerTag      = "purple"
emphasis       = "cyan"
whitespace     = "cyan:64"
dialog         = "green"
altDialog      = "#008cff"
note           = "#969696"
hidden         = "#4d4d64"
shortcode      = "yellow"
keyword        = "#ff64ff"
tag            = "orange"
value          = "orange"
spellCheckLine = "red"
errorLine      = "#bada04"
replaceTag     = "#0000b4"
modifier       = "#908eb0"
optional       = "#b4b4b4"
textHighlight  = "#ffff8460"
