[Main]
name   = "Grey Light"
mode   = "light"
author = "Veronica Berglyd Olsen"
credit = "Veronica Berglyd Olsen"
url    = "https://github.com/vkbo/novelWriter"

[Base]
base    = "#ffffff"
default = "#282828"
faded   = "#6c6c6c"
red     = "#a62a2d"
orange  = "#b36829"
yellow  = "#a68542"
green   = "#296629"
cyan    = "#269999"
blue    = "#3a70a6"
purple  = "#b35ab3"

[Project]
root     = "blue"
folder   = "yellow"
file     = "default"
title    = "green"
chapter  = "red"
scene    = "blue"
note     = "yellow"
active   = "green"
inactive = "red"
disabled = "faded"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "green"
reject    = "red"
action    = "blue"
altAction = "orange"
apply     = "green"
create    = "yellow"
destroy   = "faded"
reset     = "green"
add       = "green"
change    = "green"
remove    = "red"
shortcode = "default"
markdown  = "orange"
systemIO  = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "#efefef"
windowText      = "default"
base            = "base"
alternateBase   = "#e0e0e0"
text            = "default"
tooltipBase     = "#ffffc0"
tooltipText     = "#15150d"
button          = "#efefef"
buttonText      = "default"
brightText      = "base"
highlight       = "#3087c6"
highlightedText = "base"
link            = "blue"
linkVisited     = "blue"
accent          = "#3087c6"
toggle          = "#9999997f"
searchMatch     = "#9999997f"

[GUI]
helpText  = "default:L225"
fadedText = "faded"
errorText = "red"

[Syntax]
background     = "base"
text           = "default"
line           = "default:32"
link           = "default"
headerText     = "default:D200"
headerTag      = "default:L400"
emphasis       = "default"
whitespace     = "default:64"
dialog         = "default"
altDialog      = "default"
note           = "default"
hidden         = "faded"
shortcode      = "default:D200"
keyword        = "default:D200"
tag            = "default"
value          = "default"
optional       = "default:D200"
spellCheckLine = "red"
errorLine      = "green"
replaceTag     = "default:D200"
modifier       = "default:D200"
textHighlight  = "#00000040"
