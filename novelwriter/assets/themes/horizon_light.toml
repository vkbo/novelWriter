[Main]
name   = "Horizon Bright"
mode   = "light"
author = "Myian"
credit = "Jonathan Olaleye"
url    = "https://github.com/jolaleye/horizon-theme-vscode"

[Base]
base    = "#fdf0ed"
default = "#1a1c23"
faded   = "#99827d"
red     = "#da103f"
orange  = "#dc3318"
yellow  = "#f77d26"
green   = "#5fa306"
cyan    = "#0fac72"
blue    = "#1d8991"
purple  = "#8931B9"

[Project]
root     = "default"
folder   = "purple"
file     = "yellow"
title    = "blue"
chapter  = "red"
scene    = "orange"
note     = "faded"
active   = "#eb834f"
inactive = "faded"
disabled = "faded:L125"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "cyan"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "cyan"
create    = "yellow"
destroy   = "faded"
reset     = "cyan"
add       = "cyan"
change    = "cyan"
remove    = "red"
shortcode = "default"
markdown  = "orange"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "base"
windowText      = "default"
base            = "base"
alternateBase   = "#fadad1"
text            = "default"
tooltipBase     = "#f9cbbe"
tooltipText     = "default"
button          = "#fadad1"
buttonText      = "default"
brightText      = "base"
highlight       = "#e68656"
highlightedText = "base"
link            = "#1eaeae"
linkVisited     = "#1eaeae"
accent          = "#f6661e"

[GUI]
helpText    = "default:192"
fadedText   = "faded"
errorText   = "red"
toggle      = "#ebb2a4"
searchMatch = "purple:80"

[Syntax]
background     = "base"
text           = "default"
line           = "#fadad1"
link           = "blue"
headerText     = "red"
headerTag      = "red:128"
emphasis       = "#f6661e"
whitespace     = "#f6661e64"
dialog         = "orange"
altDialog      = "red"
note           = "blue"
hidden         = "faded"
shortcode      = "blue"
keyword        = "purple"
tag            = "blue"
value          = "faded"
optional       = "faded"
spellCheckLine = "#ff3d5d"
errorLine      = "#1eb980"
replaceTag     = "blue"
modifier       = "purple"
textHighlight  = "orange:64"
