[Main]
name   = "B4T Classic-O Dark"
mode   = "dark"
author = "Myian"
credit = "Bram de Haan"
url    = "https://atelierbram.github.io/Base4Tone-prism/b4t_classic-o/dark/"

[Base]
base    = "#22272f"
default = "#d0d5dd"
faded   = "#707F98"
red     = "#f17eaa"
orange  = "#eca277"
yellow  = "#f3cd91"
green   = "#7bd892"
cyan    = "#5ee3d1"
blue    = "#87b4fc"
purple  = "#d19af4"

[Project]
root     = "default"
folder   = "#73a7fb"
file     = "default"
title    = "#039582"
chapter  = "#1BC3AD"
scene    = "#93ebdf"
note     = "#d19af4"
active   = "default"
inactive = "faded"
disabled = "#454f5f"

[Icon]
tool      = "default"
sidebar   = "default"
accept    = "cyan"
reject    = "red"
action    = "blue"
option    = "orange"
apply     = "cyan"
create    = "yellow"
destroy   = "faded"
reset     = "cyan"
add       = "cyan"
change    = "cyan"
remove    = "red"
shortcode = "#d19af4"
markdown  = "default"
system    = "yellow"
info      = "blue"
warning   = "orange"
error     = "red"

[Palette]
window          = "#191d23"
windowText      = "default"
base            = "base"
alternateBase   = "#333b47"
text            = "default"
tooltipBase     = "yellow"
tooltipText     = "base"
button          = "#22272f"
buttonText      = "default"
brightText      = "base"
highlight       = "#1bbba5"
highlightedText = "base"
link            = "blue"
linkVisited     = "blue"
accent          = "#1bbba5"
toggle          = "#1bbba57f"
searchMatch     = "#b35ee860"

[GUI]
helpText  = "default:192"
fadedText = "faded"
errorText = "red"

[Syntax]
background     = "base"
text           = "default"
line           = "#333b47"
link           = "blue"
headerText     = "cyan"
headerTag      = "cyan:128"
emphasis       = "#5fe2d1"
whitespace     = "#5fe2d164"
dialog         = "#87B4FC"
altDialog      = "#5A96F6"
note           = "#d19af4"
hidden         = "faded"
shortcode      = "#ba6cea"
keyword        = "#877af0"
tag            = "#a095f3"
value          = "faded"
optional       = "faded"
spellCheckLine = "#ff688d"
errorLine      = "#5fe2d1"
replaceTag     = "#877af0"
modifier       = "#ba6cea"
textHighlight  = "cyan:56"
