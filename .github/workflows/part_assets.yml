name: Part-Assets

on: workflow_call

jobs:
  buildAssets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Install System Packages
        run: |
          sudo apt update
          sudo apt install qttools5-dev-tools latexmk texlive texlive-latex-extra

      - name: Setup PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pdm install --group docs

      - name: Build Assets
        run: |
          pdm run pkgutils.py build-assets
          pdm run pkgutils.py icons optional

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nw-assets
          path: |
            novelwriter/assets/manual*.pdf
            novelwriter/assets/sample.zip
            novelwriter/assets/i18n/*.qm
            novelwriter/assets/icons/*.icons
          if-no-files-found: error
          retention-days: 14
