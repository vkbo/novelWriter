name: Build macOS DMG (py2app)

on:
  workflow_dispatch:

permissions:
  contents: write

# One run per branch — protects the rolling `latest-mac` release from races.
concurrency:
  group: build-macos-dmg-py2app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile .qm translations, sample.zip, PDF manual and optional icon themes
  # once on Linux, then share the populated novelwriter/assets/ tree with
  # the per-architecture macOS jobs via an artifact.
  buildAssets:
    uses: ./.github/workflows/part_assets.yml
    permissions:
      contents: read

  build-dmg:
    needs: buildAssets
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
            label: M1
          - arch: x86_64
            runner: macos-13   # Intel
            label: AMD64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install create-dmg
        run: brew install create-dmg

      # py2app needs only pyobjc-core for its bootloader; the full pyobjc
      # meta-package pulls ~170 framework subpackages novelwriter never
      # imports (the runtime dep in pyproject.toml is unused).
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install py2app pyobjc-core PyQt6 pyenchant

      - name: Download pre-built assets
        uses: actions/download-artifact@v4
        with:
          name: nw-assets
          path: novelwriter/assets

      - name: Verify required assets are present
        run: |
          test -f novelwriter/assets/sample.zip \
            || { echo "ERROR: novelwriter/assets/sample.zip missing"; exit 1; }
          ls novelwriter/assets/i18n/*.qm >/dev/null 2>&1 \
            || { echo "ERROR: no compiled .qm translation files in novelwriter/assets/i18n/"; exit 1; }

      - name: Determine version
        id: ver
        run: echo "version=$(python pkgutils.py version)" >> "$GITHUB_OUTPUT"

      - name: Generate Info.plist
        run: python pkgutils.py gen-plist

      - name: Build .icns icon
        run: iconutil -c icns setup/macos/novelwriter.iconset -o setup/macos/novelwriter.icns

      - name: Build .app with py2app
        run: python setup/macos/setup_py2app.py py2app

      # py2app reads our gen-plist Info.plist as the base and layers its
      # runtime keys (PyRuntimeLocations etc.) on top. Confirm both halves
      # of that merge survived — overwriting Info.plist after the build
      # strips PyRuntimeLocations and prevents the bootloader from
      # finding Python.
      - name: Verify Info.plist
        run: |
          PLIST=dist/novelWriter.app/Contents/Info.plist
          plutil -extract CFBundleIdentifier raw "$PLIST"
          plutil -extract CFBundleShortVersionString raw "$PLIST"
          plutil -extract PyRuntimeLocations xml1 "$PLIST" >/dev/null \
            || { echo "ERROR: PyRuntimeLocations missing from Info.plist"; exit 1; }

      # novelwriter/config.py sets _appPath = __file__.parent.parent in
      # frozen mode. With py2app's layout that resolves to
      #   .../Contents/Resources/lib/pythonX.Y/
      # so the assets/ tree must sit there — not inside the bundled
      # novelwriter/ package directory where py2app would otherwise leave it.
      # The same PY_DIR is reused by the asset-verification step below.
      - name: Place assets and verify bundle
        run: |
          PY_DIR=$(find dist/novelWriter.app/Contents/Resources/lib -maxdepth 1 -type d -name 'python3.*' | head -1)
          test -n "$PY_DIR" || { echo "ERROR: no python3.X dir in bundle"; exit 1; }
          rm -rf "$PY_DIR/assets"
          cp -R novelwriter/assets "$PY_DIR/assets"
          test -f "$PY_DIR/assets/sample.zip" \
            || { echo "ERROR: sample.zip not bundled"; exit 1; }
          test -n "$(find "$PY_DIR/assets/i18n" -name '*.qm' 2>/dev/null)" \
            || { echo "ERROR: compiled .qm files not bundled"; exit 1; }
          test -n "$(find "$PY_DIR/assets/icons" -name '*.icons' 2>/dev/null)" \
            || { echo "ERROR: icon themes not bundled"; exit 1; }

      # Ad-hoc signing. Intentionally minimal — `--options runtime` and
      # `--entitlements` only have effect for Developer-ID-signed bundles
      # and trigger errSecCoreFoundationUnknown when combined with ad-hoc.
      # When real signing is wired up, the swap is:
      #   codesign --force --options runtime \
      #     --entitlements setup/macos/App.entitlements \
      #     --sign "Developer ID Application: <name> (<TEAMID>)" \
      #     <each embedded dylib/binary, then the .app last>
      #   xcrun notarytool submit ... --wait
      #   xcrun stapler staple dist/novelWriter.app
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "dist/novelWriter.app"

      - name: Build DMG
        run: |
          DMG_NAME="novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg"
          create-dmg \
            --volname "novelWriter ${{ steps.ver.outputs.version }}" \
            --volicon setup/macos/novelwriter.icns \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "novelWriter.app" 200 190 \
            --hide-extension "novelWriter.app" \
            --app-drop-link 600 185 \
            "$DMG_NAME" \
            "dist/novelWriter.app"
          shasum -a 256 "$DMG_NAME" | tee "$DMG_NAME.sha256"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: novelWriter-${{ steps.ver.outputs.version }}-MacOS-${{ matrix.label }}-DMG
          path: novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg*
          if-no-files-found: error
          retention-days: 14

      - name: Publish to rolling 'latest-mac' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-mac
          name: "Latest macOS build"
          body: |
            Unofficial macOS build of novelWriter (py2app).
            Built from commit `${{ github.sha }}` (run ${{ github.run_id }}).

            **Install:**
            After downloading, clear the quarantine attribute so Gatekeeper
            does not block the ad-hoc signed app:
            ```
            xattr -d com.apple.quarantine ~/Downloads/novelWriter-*.dmg
            ```
            Then mount the DMG and drag novelWriter to /Applications.

            Pick the file matching your CPU:
              * `*-arm64.dmg`  — Apple Silicon (M1/M2/M3/M4)
              * `*-x86_64.dmg` — Intel Macs

            Spell-check requires `enchant` and a dictionary; install with
            `brew install enchant hunspell` if you need it.
          prerelease: true
          files: |
            novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg
            novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg.sha256
          make_latest: "false"
