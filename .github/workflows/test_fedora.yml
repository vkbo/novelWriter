name: Fedora

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release

jobs:
  testFedora:
    name: Test Fedora Rawhide & Sys Packages
    runs-on: ubuntu-latest
    container:
      image: fedora:rawhide
    permissions:
      contents: read
    steps:
      - name: Install System Packages
        run: |
          dnf -y update
          dnf -y install \
            git \
            python3-enchant \
            python3-pyqt6 \
            python3-pytest \
            python3-pytest-qt \
            python3-pytest-timeout \
            qt6-linguist \
            qt6-qtimageformats

      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Run Build Commands
        run: |
          python pkgutils.py qtlrelease
          python pkgutils.py sample

      - name: Run Tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          python3 -m pytest -v --timeout=60
