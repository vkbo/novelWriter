name: Build macOS DMG (PyInstaller)

on:
  workflow_dispatch:

permissions:
  contents: write

# One run per ref — protects the rolling `latest-mac` release from races.
concurrency:
  group: build-macos-dmg-pyinstaller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile .qm translations, sample.zip, PDF manual and optional icon themes
  # once on Linux, then share the populated novelwriter/assets/ tree with
  # the per-architecture macOS jobs via an artifact.
  buildAssets:
    uses: ./.github/workflows/part_assets.yml
    permissions:
      contents: read

  build-dmg:
    needs: buildAssets
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
            label: M1
          - arch: x86_64
            runner: macos-13   # Intel
            label: AMD64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 pyenchant

      - name: Download pre-built assets
        uses: actions/download-artifact@v4
        with:
          name: nw-assets
          path: novelwriter/assets

      - name: Verify required assets are present
        run: |
          test -f novelwriter/assets/sample.zip \
            || { echo "ERROR: novelwriter/assets/sample.zip missing"; exit 1; }
          ls novelwriter/assets/i18n/*.qm >/dev/null 2>&1 \
            || { echo "ERROR: no compiled .qm translation files in novelwriter/assets/i18n/"; exit 1; }

      - name: Determine version
        id: ver
        run: echo "version=$(python pkgutils.py version)" >> "$GITHUB_OUTPUT"

      - name: Generate Info.plist
        run: python pkgutils.py gen-plist

      - name: Build .icns icon
        run: iconutil -c icns setup/macos/novelwriter.iconset -o setup/macos/novelwriter.icns

      # PyInstaller 6.x places package data and --add-data files inside
      # Contents/Frameworks/. novelwriter/config.py sets
      #   _appPath = Path(__file__).parent.parent
      # in frozen mode, which resolves to Contents/Frameworks/ — so
      # mapping novelwriter/assets -> assets puts the tree at exactly
      # the path config.py looks up via CONFIG.assetPath().
      - name: Build .app with PyInstaller
        run: |
          pyinstaller \
            --windowed \
            --noconfirm \
            --name novelWriter \
            --icon setup/macos/novelwriter.icns \
            --osx-bundle-identifier io.novelwriter.novelWriter \
            --collect-all novelwriter \
            --collect-all PyQt6 \
            --add-data novelwriter/assets:assets \
            novelWriter.py

      # PyInstaller's bootloader does not require special plist keys
      # (unlike py2app's PyRuntimeLocations) so overwriting with our
      # gen-plist version is safe and gives us the canonical version,
      # bundle identifier and .nwx document-type registration.
      - name: Apply generated Info.plist
        run: cp setup/macos/Info.plist dist/novelWriter.app/Contents/Info.plist

      - name: Verify bundle
        run: |
          APP_FW="dist/novelWriter.app/Contents/Frameworks"
          test -f "$APP_FW/assets/sample.zip" \
            || { echo "ERROR: sample.zip not bundled"; exit 1; }
          test -n "$(find "$APP_FW/assets/i18n" -name '*.qm' 2>/dev/null)" \
            || { echo "ERROR: compiled .qm files not bundled"; exit 1; }
          test -n "$(find "$APP_FW/assets/icons" -name '*.icons' 2>/dev/null)" \
            || { echo "ERROR: icon themes not bundled"; exit 1; }
          plutil -extract CFBundleIdentifier raw dist/novelWriter.app/Contents/Info.plist
          plutil -extract CFBundleShortVersionString raw dist/novelWriter.app/Contents/Info.plist

      # Ad-hoc signing. `--options runtime` and `--entitlements` are
      # deliberately omitted — they require a real Developer ID identity
      # to be honored and trigger errSecCoreFoundationUnknown when
      # combined with --sign -. The swap to real signing is:
      #   codesign --force --options runtime \
      #     --entitlements setup/macos/App.entitlements \
      #     --sign "Developer ID Application: <name> (<TEAMID>)" \
      #     <each embedded dylib/binary, then the .app last>
      #   xcrun notarytool submit ... --wait
      #   xcrun stapler staple dist/novelWriter.app
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "dist/novelWriter.app"

      - name: Build DMG
        run: |
          DMG_NAME="novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg"
          create-dmg \
            --volname "novelWriter ${{ steps.ver.outputs.version }}" \
            --volicon setup/macos/novelwriter.icns \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "novelWriter.app" 200 190 \
            --hide-extension "novelWriter.app" \
            --app-drop-link 600 185 \
            "$DMG_NAME" \
            "dist/novelWriter.app"
          shasum -a 256 "$DMG_NAME" | tee "$DMG_NAME.sha256"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: novelWriter-${{ steps.ver.outputs.version }}-MacOS-${{ matrix.label }}-DMG
          path: novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg*
          if-no-files-found: error
          retention-days: 14

      - name: Publish to rolling 'latest-mac' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-mac
          name: "Latest macOS build"
          body: |
            Unofficial macOS build of novelWriter (PyInstaller).
            Built from commit `${{ github.sha }}` (run ${{ github.run_id }}).

            **Install:**
            After downloading, clear the quarantine attribute so Gatekeeper
            does not block the ad-hoc signed app:
            ```
            xattr -d com.apple.quarantine ~/Downloads/novelWriter-*.dmg
            ```
            Then mount the DMG and drag novelWriter to /Applications.

            Pick the file matching your CPU:
              * `*-arm64.dmg`  — Apple Silicon (M1/M2/M3/M4)
              * `*-x86_64.dmg` — Intel Macs

            Spell-check requires `enchant` and a dictionary; install with
            `brew install enchant hunspell` if you need it.
          prerelease: true
          files: |
            novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg
            novelWriter-${{ steps.ver.outputs.version }}-${{ matrix.arch }}.dmg.sha256
          make_latest: "false"
