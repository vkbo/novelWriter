name: Build macOS DMG (PyInstaller)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG (arm64)
    runs-on: macos-14   # Apple Silicon

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: brew install enchant create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 pyenchant
          pip install -e .

      - name: Locate or generate app icon
        id: icon
        run: |
          ICON=$(find setup -name "*.icns" 2>/dev/null | head -n1)
          if [ -z "$ICON" ]; then
            ICON=$(find . -name "*.icns" -not -path "./build/*" -not -path "./dist/*" | head -n1)
          fi
          if [ -z "$ICON" ]; then
            PNG=$(find novelwriter/assets -name "*512*.png" 2>/dev/null | head -n1)
            if [ -z "$PNG" ]; then
              PNG=$(find . -name "*512*.png" -path "*icon*" | head -n1)
            fi
            if [ -n "$PNG" ]; then
              mkdir -p icon.iconset
              cp "$PNG" icon.iconset/icon_512x512.png
              iconutil -c icns icon.iconset -o novelwriter.icns
              ICON="novelwriter.icns"
            fi
          fi
          echo "icon=$ICON" >> "$GITHUB_OUTPUT"
          echo "Using icon: $ICON"

      - name: Discover data directories
        id: data
        run: |
          ARGS=""
          [ -d "novelwriter/assets" ] && ARGS="$ARGS --add-data novelwriter/assets:assets"
          [ -d "i18n" ]               && ARGS="$ARGS --add-data i18n:i18n"
          [ -d "sample" ]             && ARGS="$ARGS --add-data sample:sample"
          [ -d "novelwriter/themes" ] && ARGS="$ARGS --add-data novelwriter/themes:themes"
          [ -d "novelwriter/icons" ]  && ARGS="$ARGS --add-data novelwriter/icons:icons"
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Will pass to PyInstaller: $ARGS"

      - name: Build .app with PyInstaller
        run: |
          ICON_ARG=""
          if [ -n "${{ steps.icon.outputs.icon }}" ]; then
            ICON_ARG="--icon ${{ steps.icon.outputs.icon }}"
          fi
          pyinstaller \
            --windowed \
            --noconfirm \
            --name novelWriter \
            $ICON_ARG \
            --osx-bundle-identifier io.novelwriter.app \
            --collect-all novelwriter \
            --collect-all PyQt6 \
            --collect-binaries enchant \
            ${{ steps.data.outputs.args }} \
            novelWriter.py

      - name: Verify assets were bundled
        run: |
          echo "=== Frameworks directory contents ==="
          ls -la "dist/novelWriter.app/Contents/Frameworks/" | head -40
          echo ""
          echo "=== Looking for assets folder ==="
          if [ -d "dist/novelWriter.app/Contents/Frameworks/assets" ]; then
            echo "OK: assets/ found"
            ls "dist/novelWriter.app/Contents/Frameworks/assets/"
          else
            echo "ERROR: assets/ not found at expected path"
            find "dist/novelWriter.app" -name "assets" -type d
            exit 1
          fi

      - name: Ad-hoc codesign (reduces Gatekeeper friction)
        run: codesign --force --deep --sign - "dist/novelWriter.app"

      - name: Build DMG
        run: |
          create-dmg \
            --volname "novelWriter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "novelWriter.app" 175 190 \
            --hide-extension "novelWriter.app" \
            --app-drop-link 425 190 \
            "novelWriter-arm64.dmg" \
            "dist/novelWriter.app"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: novelWriter-arm64-dmg
          path: novelWriter-arm64.dmg

      - name: Publish to rolling 'latest-mac' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-mac
          name: "Latest macOS build (Apple Silicon)"
          body: |
            Unofficial macOS build of novelWriter for Apple Silicon (arm64).
            Built from `main` on ${{ github.event.repository.updated_at }}.
            
            **Install:**
            ```
            xattr -d com.apple.quarantine ~/Downloads/novelWriter-arm64.dmg
            ```
            Then mount and drag to /Applications.
          prerelease: true
          files: novelWriter-arm64.dmg
          make_latest: "false"
