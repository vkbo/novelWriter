name: Build macOS DMG (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13     # Intel
            arch: x86_64
          - runner: macos-14     # Apple Silicon
            arch: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: brew install enchant create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 pyenchant
          pip install -e .

      - name: Locate or generate app icon
        id: icon
        run: |
          ICON=$(find setup -name "*.icns" 2>/dev/null | head -n1)
          if [ -z "$ICON" ]; then
            ICON=$(find . -name "*.icns" -not -path "./build/*" -not -path "./dist/*" | head -n1)
          fi
          if [ -z "$ICON" ]; then
            PNG=$(find setup -name "*512*.png" 2>/dev/null | head -n1)
            if [ -z "$PNG" ]; then
              PNG=$(find . -path "*icons*" -name "*512*.png" | head -n1)
            fi
            if [ -n "$PNG" ]; then
              mkdir -p icon.iconset
              cp "$PNG" icon.iconset/icon_512x512.png
              iconutil -c icns icon.iconset -o novelwriter.icns
              ICON="novelwriter.icns"
            fi
          fi
          echo "icon=$ICON" >> "$GITHUB_OUTPUT"
          echo "Using icon: $ICON"

      - name: Build .app with PyInstaller
        run: |
          ICON_ARG=""
          if [ -n "${{ steps.icon.outputs.icon }}" ]; then
            ICON_ARG="--icon ${{ steps.icon.outputs.icon }}"
          fi
          pyinstaller \
            --windowed \
            --noconfirm \
            --name novelWriter \
            $ICON_ARG \
            --osx-bundle-identifier io.novelwriter.app \
            --collect-all novelwriter \
            --collect-all PyQt6 \
            --collect-data novelwriter \
            --collect-submodules novelwriter \
            --collect-binaries enchant \
            novelWriter.py

      - name: Ad-hoc codesign (reduces Gatekeeper friction)
        run: codesign --force --deep --sign - "dist/novelWriter.app"

      - name: Smoke-test the bundle
        run: |
          # Launch and kill after 5s; fails the workflow if it crashes immediately
          ./dist/novelWriter.app/Contents/MacOS/novelWriter --help 2>&1 | head -20 || true
          echo "Bundle inspection:"
          ls -la dist/novelWriter.app/Contents/

      - name: Build DMG
        run: |
          create-dmg \
            --volname "novelWriter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "novelWriter.app" 175 190 \
            --hide-extension "novelWriter.app" \
            --app-drop-link 425 190 \
            "novelWriter-${{ matrix.arch }}.dmg" \
            "dist/novelWriter.app"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: novelWriter-${{ matrix.arch }}-dmg
          path: novelWriter-${{ matrix.arch }}.dmg

      - name: Attach to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: novelWriter-${{ matrix.arch }}.dmg
